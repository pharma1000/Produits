<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Pharma-1000</title>
    <script>
        // ====================================
        // SPA ROUTING REDIRECT FOR GITHUB PAGES
        // ====================================
        // This file handles 404 errors and redirects to index.html
        // while preserving the clean URL path for deep linking
        
        (function() {
            // Get the current path
            var path = window.location.pathname;
            
            // Build redirect URL to index.html
            // The index.html will handle the URL and load the correct product
            var redirectUrl = '/index.html';
            
            // If not on root, preserve the path via query param for SPA handling
            if (path !== '/' && path !== '/index.html') {
                var slug = path.replace(/^\//, '').replace(/\/$/, '');
                if (slug && slug.indexOf('.') === -1) {
                    redirectUrl = '/index.html?url=' + encodeURIComponent(slug);
                }
            }
            
            // Redirect with replace to avoid history pollution
            window.location.replace(redirectUrl);
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 6rem; margin-bottom: 0.5rem; color: #e94560; }
        h2 { font-size: 1.5rem; margin-bottom: 1rem; opacity: 0.9; }
        p { font-size: 1.1rem; margin-bottom: 2rem; opacity: 0.7; }
        a {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .loading {
            margin-top: 2rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page introuvable</h2>
        <p>Redirection vers la boutique...</p>
        <div class="loading">
            <a href="/index.html">Retour à la boutique</a>
        </div>
    </div>
</body>
</html>
